<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Script to Video Generator</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Top Banner Ad Space - Google AdSense -->
    <div class="ad-container top-ad">
        <div class="ad-label">Advertisement</div>
        <!-- Google AdSense code will go here -->
        <div class="ad-placeholder">728x90 Ad Space</div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- Header -->
        <header>
            <h1>🎬 Script to Video Generator</h1>
            <p class="subtitle">Turn your scripts into engaging videos with AI</p>
        </header>

        <!-- Main Content Area with Sidebar Ad -->
        <div class="main-content">
            <!-- Sidebar Ad Space - Google AdSense -->
            <div class="sidebar-ad">
                <div class="ad-label">Advertisement</div>
                <div class="ad-placeholder">160x600 Ad Space</div>
            </div>

            <!-- Generator Area -->
            <div class="generator-area">
                <!-- Script Input -->
                <div class="input-section">
                    <label for="script">📝 Enter Your Script</label>
                    <textarea 
                        id="script" 
                        placeholder="Write or paste your script here... (max 1000 characters)"
                        maxlength="1000"
                    ></textarea>
                    <div class="char-counter">
                        <span id="charCount">0</span>/1000
                    </div>
                </div>

                <!-- Controls Grid -->
                <div class="controls-grid">
                    <!-- Voice Type -->
                    <div class="control-item">
                        <label>🎤 Voice Type</label>
                        <select id="voiceType">
                            <option value="male">Male Voice</option>
                            <option value="female" selected>Female Voice</option>
                        </select>
                    </div>

                    <!-- Speech Speed -->
                    <div class="control-item">
                        <label>⚡ Speech Speed</label>
                        <input type="range" id="speed" min="0.5" max="2" step="0.1" value="1">
                        <span id="speedValue">1.0x</span>
                    </div>

                    <!-- Video Format -->
                    <div class="control-item">
                        <label>📱 Video Format</label>
                        <select id="format">
                            <option value="9:16">9:16 (Reels/Shorts)</option>
                            <option value="16:9">16:9 (YouTube)</option>
                            <option value="1:1">1:1 (Instagram)</option>
                        </select>
                    </div>

                    <!-- Background Music -->
                    <div class="control-item">
                        <label>🎵 Background Music</label>
                        <select id="music">
                            <option value="none">No Music</option>
                            <option value="upbeat">Upbeat</option>
                            <option value="calm">Calm</option>
                        </select>
                    </div>

                    <!-- Subtitle Style -->
                    <div class="control-item">
                        <label>📝 Subtitle Style</label>
                        <select id="subtitleStyle">
                            <option value="white">White with Shadow</option>
                            <option value="yellow">Yellow Bold</option>
                        </select>
                    </div>

                    <!-- Volume Control -->
                    <div class="control-item">
                        <label>🔊 Music Volume</label>
                        <input type="range" id="volume" min="0" max="1" step="0.1" value="0.5">
                    </div>
                </div>

                <!-- Generate Button -->
                <button id="generateBtn" class="generate-btn">
                    <span>Generate Video</span>
                    <div class="loader" style="display: none;"></div>
                </button>

                <!-- Progress Bar -->
                <div class="progress-container" style="display: none;">
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: 0%;"></div>
                    </div>
                    <p class="progress-text">Processing: <span id="progressStatus">Starting...</span></p>
                </div>

                <!-- Video Preview Section -->
                <div class="video-section" style="display: none;">
                    <h3>Your Generated Video</h3>
                    <video id="videoPreview" controls>
                        <source src="" type="video/mp4">
                    </video>
                    <a id="downloadBtn" class="download-btn" download>⬇️ Download Video</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Ad Space - Google AdSense -->
    <div class="ad-container bottom-ad">
        <div class="ad-label">Advertisement</div>
        <div class="ad-placeholder">728x90 Ad Space</div>
    </div>

    <!-- Scripts -->
    <script src="script.js"></script>
</body>
</html>
